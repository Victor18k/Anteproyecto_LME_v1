    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4">Formulario de Registro</h2>

        <form>

            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" placeholder="Escribe tu nombre" required>
            </div>

            <!-- Fecha y hora -->
            <div class="mb-3">
                <label class="form-label">Fecha y hora</label>
                <input type="datetime-local" class="form-control" required>
            </div>

            <!-- Radio -->
            <div class="mb-3">
                <label class="form-label d-block">Género</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="genero" id="masc" required>
                    <label class="form-check-label" for="masc">Masculino</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="genero" id="fem">
                    <label class="form-check-label" for="fem">Femenino</label>
                </div>
            </div>

            <!-- Checkbox -->
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terminos" required>
                <label class="form-check-label" for="terminos">
                    Acepto los términos y condiciones
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                Enviar
            </button>

        </form>
    </div>
</body>

</html>
